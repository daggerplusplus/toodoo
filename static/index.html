<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toodoo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sidebar-w:260px;
  --bg:#f5f4f0;
  --sidebar-bg:#ffffff;
  --card-bg:#ffffff;
  --border:#e5e4e0;
  --text:#1a1917;
  --muted:#8a8880;
  --muted2:#b8b6b2;
  --accent:#4f7ef8;
  --danger:#ef4444;
  --sans:'Plus Jakarta Sans',sans-serif;
  --radius:10px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;transition:background-color .2s,color .2s;}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;}

/* ── Shell ── */
.app{display:flex;height:100vh;height:100dvh;overflow:hidden;}

/* ── Sidebar ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .2s ease,border-color .2s ease;
}
.sidebar.collapsed{width:0;border-right-color:transparent;}

/* ── Sidebar backdrop (mobile) ── */
.sidebar-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.4);z-index:99;
}
.sidebar-backdrop.visible{display:block;}

/* ── Sidebar toggle button ── */
.sidebar-toggle{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:background .12s,color .12s;
}
.sidebar-toggle:hover{background:var(--border);color:var(--text);}
.sidebar-logo{
  padding:20px 18px 12px;
  font-size:17px;font-weight:600;letter-spacing:-0.4px;
  display:flex;align-items:center;gap:8px;
}
.sidebar-logo svg{opacity:.8;}
.sidebar-section-label{
  padding:8px 18px 4px;
  font-size:10.5px;font-weight:600;
  color:var(--muted);letter-spacing:.06em;text-transform:uppercase;
}
.list-items{overflow-y:auto;flex:1;min-height:0;}
.list-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 16px;margin:1px 8px;
  border-radius:8px;cursor:pointer;
  transition:background .12s;
  position:relative;
}
.list-item:hover{background:#f5f4f0;}
.list-item.active{background:color-mix(in srgb,var(--list-color,var(--accent)) 12%,transparent);}
.list-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0;}
.list-name{flex:1;font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-badge{
  font-size:11px;font-weight:600;
  min-width:20px;height:20px;padding:0 5px;
  border-radius:99px;text-align:center;line-height:20px;
  background:#edece8;color:var(--muted);
}
.list-item.active .list-badge{background:color-mix(in srgb,var(--list-color,var(--accent)) 20%,transparent);color:var(--list-color,var(--accent));}

.sidebar-footer{padding:10px 8px;border-top:1px solid var(--border);}
.new-list-btn{
  display:flex;align-items:center;gap:8px;
  width:100%;padding:8px 10px;border-radius:8px;
  font-size:13px;color:var(--muted);
  transition:background .12s,color .12s;
}
.new-list-btn:hover{background:#f5f4f0;color:var(--text);}
.new-list-btn svg{opacity:.6;}

/* ── Main panel ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.main-header{
  padding:28px 28px 0;
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
.header-icon{font-size:26px;}
.header-title{font-size:22px;font-weight:600;letter-spacing:-0.4px;flex:1;}
.header-actions{display:flex;gap:6px;}
.icon-btn{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:16px;
  transition:background .12s,color .12s;
}
.icon-btn:hover{background:var(--border);color:var(--text);}
.icon-btn.active{color:var(--accent);}

.task-list-area{flex:1;overflow-y:auto;padding:16px 28px 0;min-height:0;}

/* ── Task items ── */
.section-label{
  font-size:12px;font-weight:600;color:var(--muted);
  letter-spacing:.04em;text-transform:uppercase;
  padding:16px 4px 8px;display:flex;align-items:center;gap:8px;cursor:pointer;
  user-select:none;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.section-chevron{font-size:10px;transition:transform .15s;}
.section-chevron.open{transform:rotate(90deg);}

.task-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;margin-bottom:2px;
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:var(--radius);
  cursor:pointer;
  transition:border-color .12s,box-shadow .12s;
  position:relative;
}
.task-item:hover{border-color:#d4d2ce;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.task-item.expanded{border-color:#c9c7c3;}
.task-item.done-item{opacity:.6;}

.task-check{
  width:20px;height:20px;border-radius:50%;
  border:2px solid var(--muted2);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.task-check:hover{border-color:var(--list-color,var(--accent));}
.task-check.checked{
  background:var(--list-color,var(--accent));
  border-color:var(--list-color,var(--accent));
}
.task-check.checked::after{
  content:'';display:block;
  width:5px;height:9px;
  border-right:2px solid #fff;border-bottom:2px solid #fff;
  transform:rotate(45deg) translate(-1px,-1px);
}

.task-body{flex:1;min-width:0;}
.task-title{font-size:14px;line-height:1.4;word-break:break-word;cursor:text;border-radius:4px;}
.task-title:hover{background:color-mix(in srgb,var(--accent) 8%,transparent);}
.task-title.done{text-decoration:line-through;color:var(--muted);}
.task-title-input{
  font-family:var(--sans);font-size:14px;line-height:1.4;
  width:100%;border:none;outline:2px solid var(--accent);
  border-radius:4px;background:var(--card-bg);color:var(--text);
  padding:0 2px;
}
.task-meta{display:flex;gap:10px;margin-top:3px;flex-wrap:wrap;}
.task-meta-item{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:3px;}
.task-meta-item.overdue{color:#ef4444;}
.priority-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.priority-dot.high{background:#ef4444;}
.priority-dot.normal{background:#f59e0b;}
.priority-dot.low{background:#10b981;}

.task-star{
  width:28px;height:28px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted2);font-size:16px;border-radius:6px;
  transition:color .12s,background .12s;
}
.task-star:hover{color:#f59e0b;background:#fef3c7;}
.task-star.starred{color:#f59e0b;}

.task-skip{
  width:28px;height:28px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted2);font-size:13px;border-radius:6px;
  opacity:0;transition:opacity .12s,color .12s,background .12s;
}
.task-item:hover .task-skip{opacity:1;}
.task-skip:hover{color:#f59e0b;background:#fef3c7;}
body.dark .task-skip:hover{background:#2d2a1a;}

.task-delete{
  width:28px;height:28px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted2);font-size:14px;border-radius:6px;
  opacity:0;transition:opacity .12s,color .12s,background .12s;
}
.task-item:hover .task-delete{opacity:1;}
.task-delete:hover{color:var(--danger);background:#fee2e2;}

/* expanded detail */
.task-detail{padding:8px 4px 0 30px;display:none;}
.task-item.expanded .task-detail{display:block;}
.detail-row{margin-bottom:8px;}
.detail-row label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.detail-input{
  width:100%;padding:7px 10px;font-family:var(--sans);font-size:13px;
  background:#fafaf8;border:1px solid var(--border);border-radius:7px;
  color:var(--text);outline:none;resize:vertical;
  transition:border-color .12s;
}
.detail-input:focus{border-color:var(--accent);}
.detail-row-inline{display:flex;gap:8px;}
.detail-select{
  flex:1;padding:6px 8px;font-family:var(--sans);font-size:13px;
  background:#fafaf8;border:1px solid var(--border);border-radius:7px;
  color:var(--text);outline:none;cursor:pointer;
}
.detail-select:focus{border-color:var(--accent);}

/* ── Empty state ── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:200px;gap:10px;color:var(--muted);
}
.empty-state .empty-icon{font-size:40px;opacity:.35;}
.empty-state p{font-size:14px;}

/* ── Add task ── */
.add-task-bar{
  padding:16px 28px 20px;flex-shrink:0;
}
.add-task-form{
  display:flex;align-items:center;gap:10px;
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 14px;
  transition:border-color .15s,box-shadow .15s;
}
.add-task-form:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 15%,transparent);}
.add-task-plus{
  width:20px;height:20px;border-radius:50%;
  border:2px solid var(--accent);color:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
}
.add-task-input{
  flex:1;font-family:var(--sans);font-size:14px;
  border:none;outline:none;background:none;color:var(--text);
}
.add-task-input::placeholder{color:var(--muted2);}
.add-task-submit{
  font-size:13px;font-weight:500;padding:5px 14px;
  background:var(--accent);color:#fff;border-radius:7px;
  opacity:0;transition:opacity .12s;pointer-events:none;
}
.add-task-form:focus-within .add-task-submit{opacity:1;pointer-events:all;}
.add-task-submit:hover{background:#3b6be0;}

/* ── New list modal ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.35);
  display:flex;align-items:center;justify-content:center;
  z-index:50;opacity:0;pointer-events:none;transition:opacity .15s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:#fff;border-radius:14px;padding:24px;width:360px;
  box-shadow:0 20px 60px rgba(0,0,0,.15);
}
.modal h2{font-size:15px;font-weight:600;margin-bottom:16px;}
.modal input{
  width:100%;padding:9px 12px;font-family:var(--sans);font-size:14px;
  border:1px solid var(--border);border-radius:8px;outline:none;
  transition:border-color .12s;
}
.modal input:focus{border-color:var(--accent);}
.modal-emoji-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.emoji-pick{
  width:36px;height:36px;font-size:18px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  border:2px solid transparent;transition:border-color .12s,background .12s;
  background:#f5f4f0;
}
.emoji-pick.selected{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent);}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
.btn-cancel{font-size:13px;padding:7px 16px;border:1px solid var(--border);border-radius:7px;color:var(--muted);}
.btn-cancel:hover{background:#f5f4f0;}
.btn-primary{font-size:13px;padding:7px 16px;border-radius:7px;background:var(--accent);color:#fff;font-weight:500;}
.btn-primary:hover{background:#3b6be0;}

/* ── Log items ── */
.log-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;margin-bottom:2px;
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--radius);
}
.log-check{
  width:20px;height:20px;border-radius:50%;flex-shrink:0;margin-top:1px;
  background:var(--accent);border:2px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
}
.log-check::after{
  content:'';display:block;width:5px;height:9px;
  border-right:2px solid #fff;border-bottom:2px solid #fff;
  transform:rotate(45deg) translate(-1px,-1px);
}
.log-skip-icon{
  width:20px;height:20px;border-radius:50%;flex-shrink:0;margin-top:1px;
  background:#f59e0b;border:2px solid #f59e0b;
  display:flex;align-items:center;justify-content:center;color:#fff;
}
.log-skip-reason{font-style:italic;}
.log-body{flex:1;min-width:0;}
.log-title{font-size:14px;line-height:1.4;word-break:break-word;}
.log-time{font-size:12px;color:var(--muted);flex-shrink:0;margin-top:2px;white-space:nowrap;}
.log-section-label{
  font-size:12px;font-weight:600;color:var(--muted);
  letter-spacing:.04em;text-transform:uppercase;
  padding:16px 4px 8px;display:flex;align-items:center;gap:8px;
}
.log-section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* scrollbar */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}

/* ── Dark mode ── */
body.dark{
  --bg:#1a1917;
  --sidebar-bg:#222120;
  --card-bg:#222120;
  --border:#38362f;
  --text:#f0ede8;
  --muted:#9a9488;
  --muted2:#6a6560;
}
body.dark .sidebar,
body.dark .task-item,
body.dark .log-item,
body.dark .add-task-form{transition:background-color .2s,border-color .2s;}
body.dark .list-item:hover{background:#2c2b28;}
body.dark .list-badge{background:#302f2b;}
body.dark .new-list-btn:hover{background:#2c2b28;}
body.dark .task-item:hover{border-color:#4a4840;box-shadow:0 1px 4px rgba(0,0,0,.25);}
body.dark .task-item.expanded{border-color:#55524a;}
body.dark .task-star:hover{background:#2d2a1a;}
body.dark .task-delete:hover{background:#2d1a1a;}
body.dark .detail-input,
body.dark .detail-select{background:#151412;color:var(--text);border-color:var(--border);}
body.dark .modal{background:#222120;color:var(--text);box-shadow:0 20px 60px rgba(0,0,0,.5);}
body.dark .modal input{background:#151412;color:var(--text);border-color:var(--border);}
body.dark .emoji-pick{background:#2c2b28;}
body.dark .btn-cancel{border-color:var(--border);color:var(--muted);}
body.dark .btn-cancel:hover{background:#2c2b28;}
body.dark ::-webkit-scrollbar-thumb{background:#44423c;}

/* ── Sharing modal ── */
.share-member-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 0;font-size:14px;border-bottom:1px solid var(--border);
}
.share-member-row:last-child{border-bottom:none;}
.share-member-name{color:var(--text);}
.share-member-owner{font-size:11px;color:var(--muted);margin-left:6px;}
.share-remove-btn{
  font-size:12px;padding:3px 9px;
  background:color-mix(in srgb,var(--danger) 10%,transparent);
  color:var(--danger);border:none;border-radius:5px;cursor:pointer;
  transition:background .12s;
}
.share-remove-btn:hover{background:color-mix(in srgb,var(--danger) 18%,transparent);}
.share-add-row{display:flex;gap:8px;margin-top:14px;}
.share-add-row input{
  flex:1;padding:8px 10px;font-family:var(--sans);font-size:14px;
  border:1px solid var(--border);border-radius:8px;
  background:var(--bg);color:var(--text);outline:none;
  transition:border-color .12s;
}
.share-add-row input:focus{border-color:var(--accent);}
.share-error{font-size:12px;color:var(--danger);margin-top:6px;min-height:16px;}
.list-shared-badge{
  font-size:10px;color:var(--muted);margin-left:4px;opacity:.7;flex-shrink:0;
}
.list-delete{
  width:22px;height:22px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted2);font-size:12px;border-radius:5px;
  opacity:0;transition:opacity .12s,color .12s,background .12s;
}
.list-item:hover .list-delete{opacity:1;}
.list-delete:hover{color:var(--danger);background:#fee2e2;}
body.dark .list-delete:hover{background:#2d1a1a;}
/* ── Drag & drop ── */
.drag-handle{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  cursor:grab;touch-action:none;color:var(--muted2);
  opacity:0;transition:opacity .12s;
}
.drag-handle:active{cursor:grabbing;}
.list-item:hover .drag-handle,.task-item:hover .drag-handle{opacity:1;}
.drag-placeholder-list{
  height:36px;border-radius:8px;margin:1px 8px;
  background:color-mix(in srgb,var(--accent) 8%,transparent);
  border:2px dashed color-mix(in srgb,var(--accent) 40%,transparent);
  box-sizing:border-box;
}
.drag-placeholder-task{
  height:44px;border-radius:var(--radius);margin-bottom:2px;
  background:color-mix(in srgb,var(--accent) 8%,transparent);
  border:2px dashed color-mix(in srgb,var(--accent) 40%,transparent);
  box-sizing:border-box;
}

.list-move-btn{
  width:22px;height:22px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted2);border-radius:5px;
  opacity:0;transition:opacity .12s,color .12s,background .12s;
}
.list-item:hover .list-move-btn{opacity:1;}
.list-move-btn:hover{color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent);}

/* ── Category sections ── */
.category-header{
  display:flex;align-items:center;gap:4px;
  padding:6px 16px 4px;margin:2px 8px;border-radius:6px;
  font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);cursor:pointer;user-select:none;
  transition:background .12s;
}
.category-header:hover{background:#f5f4f0;}
body.dark .category-header:hover{background:#2c2b28;}
.category-chevron{font-size:10px;transition:transform .15s;margin-right:2px;display:inline-block;}
.category-chevron.open{transform:rotate(90deg);}
.category-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.category-header-actions{display:flex;gap:2px;opacity:0;transition:opacity .12s;}
.category-header:hover .category-header-actions{opacity:1;}
.cat-hdr-btn{
  width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;
  border-radius:4px;font-size:11px;color:var(--muted2);
  transition:color .12s,background .12s;
}
.cat-hdr-btn.rename:hover{color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent);}
.cat-hdr-btn.del:hover{color:var(--danger);background:#fee2e2;}
body.dark .cat-hdr-btn.del:hover{background:#2d1a1a;}
.category-lists.collapsed{display:none;}

/* ── Category assignment dropdown ── */
#cat-dropdown{
  position:fixed;z-index:200;display:none;
  background:var(--sidebar-bg);border:1px solid var(--border);
  border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.12);
  min-width:170px;padding:4px 0;
}
.cat-dd-item{
  padding:7px 14px;font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  transition:background .1s;white-space:nowrap;
}
.cat-dd-item:hover{background:#f5f4f0;}
body.dark .cat-dd-item:hover{background:#2c2b28;}
.cat-dd-item.active{color:var(--accent);font-weight:600;}
.cat-dd-divider{border-top:1px solid var(--border);margin:4px 0;}

/* ── Mobile / responsive ── */
@media (max-width:640px){
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;z-index:100;
    width:var(--sidebar-w) !important;
    transform:translateX(-100%);
    transition:transform .2s ease;
    box-shadow:none;
  }
  .sidebar.mobile-open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,.15);}
  .sidebar.collapsed{width:var(--sidebar-w) !important;}
  .main-header{padding:16px 16px 0;}
  .task-list-area{padding:12px 16px 0;}
  .add-task-bar{padding:12px 16px 16px;}
  .detail-row-inline{flex-direction:column;}
  .modal{width:calc(100% - 32px);}
}
</style>
</head>
<body>
<div id="sidebar-backdrop" class="sidebar-backdrop" onclick="closeSidebar()"></div>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>

      <button id="dark-toggle-btn" class="icon-btn" onclick="toggleDark()" title="Toggle dark mode" style="margin-left:auto"></button>

    <div class="sidebar-footer">
      <button class="new-list-btn" onclick="openNewListModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New list
      </button>
      <button class="new-list-btn" onclick="createCategory()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        New category
      </button>
      <button class="new-list-btn" id="invite-btn" onclick="inviteSomeone()" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Invite someone
      </button>
      <button class="new-list-btn" id="logout-btn" onclick="doLogout()" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-header" id="main-header">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="header-icon" id="header-icon">📋</span>
      <span class="header-title" id="header-title">Select a list</span>
      <div class="header-actions">
        <button class="icon-btn" id="share-btn" title="Share list" onclick="openShareModal()" style="display:none">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </button>
        <button class="icon-btn" id="clear-done-btn" title="Clear completed tasks" onclick="clearCompleted()" style="display:none">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/><line x1="5" y1="5" x2="19" y2="19"/></svg>
        </button>
        <button class="icon-btn" id="sort-btn" title="Sort by due date" onclick="toggleSort()" style="display:none">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </button>
        <button class="icon-btn" id="toggle-done-btn" title="Show completed" onclick="toggleShowDone()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg>
        </button>

    <div class="task-list-area" id="task-list-area">
      <div class="empty-state">
        <div class="empty-icon">☑️</div>
        <p>Select a list to get started</p>
      </div>
    </div>

    <div class="add-task-bar" id="add-task-bar" style="display:none">
      <div class="add-task-form">
        <div class="add-task-plus">+</div>
        <input class="add-task-input" id="add-input" placeholder="Add a task" />
        <button class="add-task-submit" onclick="submitAddTask()">Add</button>
      </div>
    </div>
  </main>
</div>

<!-- New list modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalBg(event)">
  <div class="modal">
    <h2>New list</h2>
    <input id="modal-name" placeholder="List name" maxlength="50" />
    <div class="modal-emoji-row" id="emoji-row"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="submitNewList()">Create</button>
    </div>
  </div>
</div>

<!-- Category assignment dropdown (populated + positioned by JS) -->
<div id="cat-dropdown"></div>

<!-- Share modal -->
<div class="modal-overlay" id="share-modal-overlay" onclick="closeShareModalBg(event)">
  <div class="modal">
    <h2 id="share-modal-title">Share list</h2>
    <div id="share-members-list" style="margin:12px 0;min-height:32px;"></div>
    <div class="share-add-row">
      <input id="share-add-input" placeholder="Add by username" maxlength="50"
             onkeydown="if(event.key==='Enter')addShareMember()">
      <button class="btn-primary" onclick="addShareMember()">Add</button>
    </div>
    <div class="share-error" id="share-error"></div>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn-cancel" onclick="closeShareModal()">Done</button>
    </div>
  </div>
</div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
let lists = [];
let tasks = [];
let categories = [];
let currentUser = null;
let activeListId = null;
let activeView = 'tasks'; // 'tasks' | 'log'
let showDone = false;
let sortMode = 'default'; // 'default' | 'due_date'
let expandedTaskId = null;
let selectedEmoji = '📋';
let darkMode = localStorage.getItem('darkMode') === 'true';
let sidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
let collapsedCategories = new Set(JSON.parse(localStorage.getItem('collapsedCategories') || '[]'));

const MOON_SVG = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
const SUN_SVG  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;

function applyDark() {
  document.body.classList.toggle('dark', darkMode);
  document.getElementById('dark-toggle-btn').innerHTML = darkMode ? SUN_SVG : MOON_SVG;
}

function toggleDark() {
  darkMode = !darkMode;
  localStorage.setItem('darkMode', darkMode);
  applyDark();
}

function applySidebar() {
  const sidebar = document.querySelector('.sidebar');
  if (window.innerWidth > 640) {
    sidebar.classList.toggle('collapsed', sidebarCollapsed);
    sidebar.classList.remove('mobile-open');
    document.getElementById('sidebar-backdrop').classList.remove('visible');
  }
}

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  if (window.innerWidth <= 640) {
    const open = sidebar.classList.toggle('mobile-open');
    document.getElementById('sidebar-backdrop').classList.toggle('visible', open);
  } else {
    sidebarCollapsed = !sidebarCollapsed;
    localStorage.setItem('sidebarCollapsed', sidebarCollapsed);
    sidebar.classList.toggle('collapsed', sidebarCollapsed);
  }
}

function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('mobile-open');
  document.getElementById('sidebar-backdrop').classList.remove('visible');
}

const EMOJIS = ['📋','🏠','💼','🎯','📚','🛒','💡','🏃','✈️','🎵','🍕','❤️'];

// ── API helpers ──────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(path, opts);
  if (res.status === 401) { window.location.href = '/login'; return null; }
  if (res.status === 204) return null;
  return res.json();
}

// ── Bootstrap ────────────────────────────────────────────────────────────────
async function boot() {
  const me = await api('GET', '/api/me');
  if (!me) return;
  currentUser = me;
  const userEl = document.getElementById('sidebar-user');
  userEl.textContent = me.username;
  userEl.style.display = '';
  if (me.is_admin) document.getElementById('invite-btn').style.display = '';
  document.getElementById('logout-btn').style.display = '';
  [lists, categories] = await Promise.all([
    api('GET', '/api/lists'),
    api('GET', '/api/categories'),
  ]);
  renderSidebar();
  if (lists.length) selectList(lists[0].id);
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
const DRAG_SVG = `<svg width="10" height="12" viewBox="0 0 10 12" fill="currentColor"><circle cx="2" cy="2" r="1.5"/><circle cx="8" cy="2" r="1.5"/><circle cx="2" cy="6" r="1.5"/><circle cx="8" cy="6" r="1.5"/><circle cx="2" cy="10" r="1.5"/><circle cx="8" cy="10" r="1.5"/></svg>`;

function renderListItem(l) {
  const isShared = currentUser && l.user_id !== currentUser.id;
  return `
  <div class="list-item ${activeView==='tasks'&&l.id===activeListId?'active':''}"
       style="--list-color:${l.color}" data-id="${l.id}"
       onclick="selectList(${l.id})">
    ${!isShared ? `<span class="drag-handle" style="width:18px;height:28px;" onpointerdown="startListDrag(event,${l.id})">${DRAG_SVG}</span>` : ''}
    <span class="list-icon">${l.icon}</span>
    <span class="list-name">${esc(l.name)}</span>
    ${isShared ? `<span class="list-shared-badge" title="Shared by ${esc(l.owner_username)}">👥</span>` : ''}
    ${l.pending > 0 ? `<span class="list-badge">${l.pending}</span>` : ''}
    ${!isShared ? `<button class="list-move-btn" onclick="event.stopPropagation();openCategoryDropdown(${l.id},event)" title="Move to category">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    </button>` : ''}
    ${!isShared ? `<button class="list-delete" onclick="event.stopPropagation();deleteList(${l.id})" title="Delete list">✕</button>` : ''}
  </div>`;
}

function renderSidebar() {
  const el = document.getElementById('list-items');

  const logItem = `
    <div class="list-item ${activeView==='log'?'active':''}"
         style="--list-color:#6366f1" onclick="selectLog()">
      <span class="list-icon">📜</span>
      <span class="list-name">Activity Log</span>
    </div>`;

  const ownedLists = lists.filter(l => currentUser && l.user_id === currentUser.id);
  const sharedLists = lists.filter(l => currentUser && l.user_id !== currentUser.id);

  // Group owned lists by category
  const byCategory = {};
  const uncategorized = [];
  ownedLists.forEach(l => {
    if (l.category_id) {
      (byCategory[l.category_id] = byCategory[l.category_id] || []).push(l);
    } else {
      uncategorized.push(l);
    }
  });

  const categorySections = categories.map(cat => {
    const catLists = byCategory[cat.id] || [];
    const collapsed = collapsedCategories.has(cat.id);
    return `
    <div class="category-section">
      <div class="category-header" onclick="toggleCategory(${cat.id})">
        <span class="category-chevron ${collapsed ? '' : 'open'}">›</span>
        <span class="category-name">${esc(cat.name)}</span>
        <span class="category-header-actions" onclick="event.stopPropagation()">
          <button class="cat-hdr-btn rename" onclick="renameCategory(${cat.id})" title="Rename">✎</button>
          <button class="cat-hdr-btn del" onclick="deleteCategory(${cat.id})" title="Delete category">✕</button>
        </span>
      </div>
      <div class="category-lists ${collapsed ? 'collapsed' : ''}">
        ${catLists.length ? catLists.map(renderListItem).join('') : '<div style="padding:3px 16px 3px 42px;font-size:12px;color:var(--muted2)">No lists</div>'}
      </div>
    </div>`;
  }).join('');

  el.innerHTML = logItem + categorySections + uncategorized.map(renderListItem).join('') + sharedLists.map(renderListItem).join('');
}

async function selectList(id) {
  if (window.innerWidth <= 640) closeSidebar();
  activeView = 'tasks';
  activeListId = id;
  expandedTaskId = null;
  const list = lists.find(l => l.id === id);
  document.getElementById('header-icon').textContent = list.icon;
  document.getElementById('header-title').textContent = list.name;
  document.getElementById('main-header').style.color = list.color;
  document.getElementById('add-task-bar').style.display = '';
  document.getElementById('toggle-done-btn').style.display = '';
  document.getElementById('toggle-done-btn').classList.toggle('active', showDone);
  document.getElementById('sort-btn').style.display = '';
  document.getElementById('sort-btn').classList.toggle('active', sortMode === 'due_date');
  document.getElementById('clear-done-btn').style.display = '';
  const isOwner = currentUser && list.user_id === currentUser.id;
  document.getElementById('share-btn').style.display = isOwner ? '' : 'none';
  renderSidebar();
  await loadTasks();
}

async function selectLog() {
  if (window.innerWidth <= 640) closeSidebar();
  activeView = 'log';
  activeListId = null;
  document.getElementById('header-icon').textContent = '📜';
  document.getElementById('header-title').textContent = 'Activity Log';
  document.getElementById('main-header').style.color = '#6366f1';
  document.getElementById('add-task-bar').style.display = 'none';
  document.getElementById('toggle-done-btn').style.display = 'none';
  document.getElementById('sort-btn').style.display = 'none';
  document.getElementById('clear-done-btn').style.display = 'none';
  document.getElementById('share-btn').style.display = 'none';
  renderSidebar();
  const entries = await api('GET', '/api/log');
  renderLog(entries);
}

function renderLog(entries) {
  const area = document.getElementById('task-list-area');
  if (!entries.length) {
    area.innerHTML = `<div class="empty-state"><div class="empty-icon">📜</div><p>No completed tasks yet</p></div>`;
    return;
  }

  // Group by local date
  const groups = new Map();
  for (const e of entries) {
    const dt = new Date(e.completed_at.replace(' ', 'T') + 'Z');
    const key = dt.toLocaleDateString('en-CA'); // YYYY-MM-DD in local time
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(e);
  }

  let html = '';
  for (const [dateKey, items] of groups) {
    html += `<div class="log-section-label">${fmtLogDate(dateKey)}</div>`;
    html += items.map(e => logEntryHTML(e)).join('');
  }
  area.innerHTML = html;
}

function logEntryHTML(e) {
  const dt = new Date(e.completed_at.replace(' ', 'T') + 'Z');
  const time = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  const recurrenceMeta = e.recurrence
    ? `<span class="task-meta-item">🔁 ${fmtRecurrence(e.recurrence)}${e.cycles_late > 0 ? ` · ${e.cycles_late} behind` : ''}</span>`
    : '';
  const SKIP_SVG = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>`;
  const icon = e.skipped
    ? `<div class="log-skip-icon">${SKIP_SVG}</div>`
    : `<div class="log-check"></div>`;
  const skippedBadge = e.skipped
    ? `<span class="task-meta-item" style="color:#f59e0b;font-weight:600">Skipped</span>`
    : '';
  const reasonMeta = e.skipped && e.reason
    ? `<span class="task-meta-item log-skip-reason">💬 ${esc(e.reason)}</span>`
    : '';
  return `
  <div class="log-item">
    ${icon}
    <div class="log-body">
      <div class="log-title">${esc(e.task_title)}</div>
      <div class="task-meta">
        <span class="task-meta-item">📋 ${esc(e.list_name)}</span>
        ${skippedBadge}
        ${recurrenceMeta}
        ${reasonMeta}
      </div>
    </div>
    <div class="log-time">${time}</div>
  </div>`;
}

function fmtLogDate(isoDate) {
  const dt = new Date(isoDate + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((dt - today) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === -1) return 'Yesterday';
  return dt.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

async function loadTasks() {
  if (!activeListId) return;
  tasks = await api('GET', `/api/lists/${activeListId}/tasks?include_done=${showDone}&sort=${sortMode}`);
  renderTasks();
}

// ── Tasks ────────────────────────────────────────────────────────────────────
function renderTasks() {
  const area = document.getElementById('task-list-area');
  const list = lists.find(l => l.id === activeListId);
  const color = list?.color || '#4f7ef8';

  const pending = tasks.filter(t => !t.done);
  const done    = tasks.filter(t => t.done);

  if (!pending.length && !done.length) {
    area.innerHTML = `<div class="empty-state"><div class="empty-icon">✅</div><p>All clear — add a task below</p></div>`;
    return;
  }

  let html = pending.map(t => taskHTML(t, color)).join('');

  if (showDone && done.length) {
    html += `<div class="section-label" onclick="toggleDoneSection(this)">
      <span class="section-chevron open">▶</span>
      Completed&nbsp;(${done.length})
    </div>
    <div id="done-section">${done.map(t => taskHTML(t, color)).join('')}</div>`;
  }

  area.innerHTML = html;
  area.querySelectorAll('.task-item').forEach(el => {
    if (parseInt(el.dataset.id) === expandedTaskId) el.classList.add('expanded');
  });
}

function taskHTML(t, color) {
  const overdue = t.due_date && !t.done && (
    t.due_date.length > 10 ? new Date(t.due_date) < new Date()
                           : new Date(t.due_date + 'T00:00:00') < new Date()
  );
  return `
  <div class="task-item ${t.done ? 'done-item' : ''}" data-id="${t.id}"
       style="--list-color:${color}" onclick="toggleExpand(event,${t.id})">
    ${!t.done && sortMode === 'default' ? `<span class="drag-handle" style="width:16px;height:28px;margin-top:1px;" onpointerdown="startTaskDrag(event,${t.id})">${DRAG_SVG}</span>` : ''}
    <div class="task-check ${t.done ? 'checked' : ''}"
         onclick="event.stopPropagation();toggleDone(${t.id})"></div>
    <div class="task-body">
      <div class="task-title ${t.done ? 'done' : ''}" onclick="event.stopPropagation();editTaskTitle(${t.id},this)">${esc(t.title)}</div>
      <div class="task-meta">
        ${t.priority !== 'normal' ? `<span class="task-meta-item"><span class="priority-dot ${t.priority}"></span>${t.priority}</span>` : ''}
        ${t.due_date ? `<span class="task-meta-item ${overdue ? 'overdue' : ''}">📅 ${fmtDate(t.due_date)}</span>` : ''}
        ${t.notes ? `<span class="task-meta-item">📝 Note</span>` : ''}
        ${(()=>{ const c=calcOverdueCycles(t); return c>0?`<span class="task-meta-item overdue">🔁 ${c} behind</span>`:''; })()}
      </div>
      <div class="task-detail" onclick="event.stopPropagation()">
        <div class="detail-row">
          <label>Notes</label>
          <textarea class="detail-input" rows="2"
            onchange="patchTask(${t.id},{notes:this.value})"
            placeholder="Add a note…">${esc(t.notes || '')}</textarea>
        </div>
        <div class="detail-row detail-row-inline">
          <div style="flex:1.4">
            <label>Due date</label>
            <div style="display:flex;gap:4px">
              <input type="date" id="due-date-${t.id}" class="detail-input detail-select" style="flex:1;min-width:0"
                value="${(t.due_date||'').substring(0,10)}"
                onchange="saveDueDate(${t.id})">
              <input type="time" id="due-time-${t.id}" class="detail-input detail-select" style="flex:0.8;min-width:0"
                value="${t.due_date&&t.due_date.length>10?t.due_date.substring(11,16):''}"
                onchange="saveDueDate(${t.id})">
            </div>
          </div>
          <div style="flex:1">
            <label>Priority</label>
            <select class="detail-select" onchange="patchTask(${t.id},{priority:this.value})">
              <option value="low"    ${t.priority==='low'?'selected':''}>Low</option>
              <option value="normal" ${t.priority==='normal'?'selected':''}>Normal</option>
              <option value="high"   ${t.priority==='high'?'selected':''}>High</option>
            </select>
          </div>
          <div style="flex:1">
            <label>Repeat</label>
            ${repeatFieldHTML(t)}
          </div>
          <div style="flex:1">
            <label>Move to</label>
            <select class="detail-select" onchange="moveTask(${t.id},+this.value)">
              <option value="${t.list_id}">${esc(lists.find(l=>l.id===activeListId)?.name||'')}</option>
              ${lists.filter(l=>l.id!==activeListId).map(l=>`<option value="${l.id}">${esc(l.name)}</option>`).join('')}
            </select>
          </div>
        </div>
      </div>
    </div>
    <button class="task-star ${t.starred ? 'starred' : ''}"
            onclick="event.stopPropagation();starTask(${t.id})" title="Star">★</button>
    ${t.recurrence && !t.done ? `<button class="task-skip" onclick="event.stopPropagation();skipTask(${t.id})" title="Skip this occurrence">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
    </button>` : ''}
    <button class="task-delete" onclick="event.stopPropagation();deleteTask(${t.id})" title="Delete">✕</button>
  </div>`;
}

function toggleExpand(e, id) {
  expandedTaskId = expandedTaskId === id ? null : id;
  renderTasks();
}

function toggleDoneSection(labelEl) {
  const section = document.getElementById('done-section');
  const chev = labelEl.querySelector('.section-chevron');
  const open = chev.classList.toggle('open');
  section.style.display = open ? '' : 'none';
}

// ── Repeat field ─────────────────────────────────────────────────────────────
function _isCustomRecurrence(r) {
  if (!r) return false;
  return !['daily','weekly','monthly','yearly','1d','1w','1m','1y'].includes(r);
}

function repeatFieldHTML(t) {
  const isCustom = _isCustomRecurrence(t.recurrence);
  const p = isCustom ? parseRecurrence(t.recurrence) : null;
  const unitLabels = {d:'days', w:'weeks', m:'months', y:'years'};
  return `<select class="detail-select" id="repeat-sel-${t.id}" onchange="onRepeatChange(this,${t.id})">
    <option value=""        ${!t.recurrence?'selected':''}>None</option>
    <option value="1d"      ${t.recurrence==='daily'||t.recurrence==='1d'?'selected':''}>Daily</option>
    <option value="1w"      ${t.recurrence==='weekly'||t.recurrence==='1w'?'selected':''}>Weekly</option>
    <option value="1m"      ${t.recurrence==='monthly'||t.recurrence==='1m'?'selected':''}>Monthly</option>
    <option value="1y"      ${t.recurrence==='yearly'||t.recurrence==='1y'?'selected':''}>Yearly</option>
    <option value="custom"  ${isCustom?'selected':''}>Custom…</option>
  </select>
  <div id="custom-repeat-${t.id}" style="display:${isCustom?'flex':'none'};align-items:center;gap:4px;margin-top:4px">
    <span style="font-size:0.8em;opacity:.7">Every</span>
    <input type="number" min="1" max="999" value="${p?p.n:2}" style="width:48px;padding:2px 4px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.85em" id="custom-n-${t.id}">
    <select id="custom-unit-${t.id}" style="padding:2px 4px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.85em">
      <option value="d" ${p&&p.unit==='d'?'selected':''}>days</option>
      <option value="w" ${p&&p.unit==='w'?'selected':''}>weeks</option>
      <option value="m" ${p&&p.unit==='m'?'selected':''}>months</option>
      <option value="y" ${p&&p.unit==='y'?'selected':''}>years</option>
    </select>
    <button onclick="saveCustomRepeat(${t.id})" style="padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:0.85em">Set</button>
  </div>`;
}

function onRepeatChange(sel, taskId) {
  const customDiv = document.getElementById(`custom-repeat-${taskId}`);
  if (sel.value === 'custom') {
    if (customDiv) customDiv.style.display = 'flex';
  } else {
    if (customDiv) customDiv.style.display = 'none';
    patchTask(taskId, { recurrence: sel.value || null });
  }
}

function saveCustomRepeat(taskId) {
  const n = parseInt(document.getElementById(`custom-n-${taskId}`)?.value || '1');
  const unit = document.getElementById(`custom-unit-${taskId}`)?.value || 'w';
  if (!n || n < 1) return;
  // Collapse canonical presets back to named aliases for clarity
  const recurrence = (n === 1 && unit === 'd') ? '1d'
    : (n === 1 && unit === 'w') ? '1w'
    : (n === 1 && unit === 'm') ? '1m'
    : (n === 1 && unit === 'y') ? '1y'
    : `${n}${unit}`;
  patchTask(taskId, { recurrence });
}

// ── Task actions ─────────────────────────────────────────────────────────────
function saveDueDate(taskId) {
  const dateVal = document.getElementById(`due-date-${taskId}`)?.value || '';
  const timeVal = document.getElementById(`due-time-${taskId}`)?.value || '';
  const due_date = dateVal ? (timeVal ? `${dateVal}T${timeVal}` : dateVal) : null;
  patchTask(taskId, { due_date });
}

async function toggleDone(id) {
  await api('POST', `/api/tasks/${id}/toggle`);
  await refresh();
}

async function starTask(id) {
  await api('POST', `/api/tasks/${id}/star`);
  const t = tasks.find(t => t.id === id);
  if (t) t.starred = !t.starred;
  renderTasks();
}

async function deleteTask(id) {
  await api('DELETE', `/api/tasks/${id}`);
  if (expandedTaskId === id) expandedTaskId = null;
  await refresh();
}

async function skipTask(id) {
  const reason = window.prompt('Skip reason (optional):');
  if (reason === null) return; // cancelled
  await api('POST', `/api/tasks/${id}/skip`, { reason: reason || null });
  await refresh();
}

function editTaskTitle(id, el) {
  if (el.querySelector('input')) return;
  const t = tasks.find(t => t.id === id);
  const original = t.title;
  el.textContent = '';
  const input = document.createElement('input');
  input.className = 'task-title-input';
  input.value = original;
  el.appendChild(input);
  input.focus();
  input.select();

  let saved = false;
  async function save() {
    if (saved) return;
    saved = true;
    const title = input.value.trim();
    if (title && title !== original) {
      await patchTask(id, { title });
    } else {
      el.textContent = original;
    }
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); save(); }
    if (e.key === 'Escape') { saved = true; el.textContent = original; }
  });
  input.addEventListener('blur', save);
}

async function patchTask(id, patch) {
  await api('PATCH', `/api/tasks/${id}`, patch);
  await refresh(true);
}

async function moveTask(id, targetListId) {
  if (targetListId === activeListId) return;
  expandedTaskId = null;
  await api('PATCH', `/api/tasks/${id}`, { list_id: targetListId });
  await refresh();
}

async function submitAddTask() {
  const input = document.getElementById('add-input');
  const title = input.value.trim();
  if (!title || !activeListId) return;
  input.value = '';
  await api('POST', `/api/lists/${activeListId}/tasks`, { title });
  await refresh();
}

document.getElementById('add-input').addEventListener('keydown', e => {

});

  document.getElementById('toggle-done-btn').classList.toggle('active', showDone);

function toggleSort() {

async function clearCompleted() {

// ── Drag & drop engine ────────────────────────────────────────────────────────
let _drag = null;

document.addEventListener('pointermove', e => {
  if (!_drag) return;
  const { ghost, ph, container, itemSelector, offsetX, offsetY } = _drag;
  ghost.style.top  = (e.clientY - offsetY) + 'px';
  ghost.style.left = (e.clientX - offsetX) + 'px';

  const items = [...container.querySelectorAll(':scope > ' + itemSelector)]
    .filter(el => el !== _drag.item && el !== ph);

  let insertBefore = null;
  for (const sib of items) {
    const r = sib.getBoundingClientRect();
    if (e.clientY < r.top + r.height / 2) { insertBefore = sib; break; }
  }
  if (insertBefore) container.insertBefore(ph, insertBefore);
  else if (items.length) items[items.length - 1].after(ph);
  else container.appendChild(ph);
});

document.addEventListener('pointerup', _endDrag);
document.addEventListener('pointercancel', _cancelDrag);

function _startDrag(e, item, container, itemSelector, phClass, onDrop) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.setPointerCapture(e.pointerId);

  const rect = item.getBoundingClientRect();
  const ghost = item.cloneNode(true);
  Object.assign(ghost.style, {
    position: 'fixed', zIndex: 1000, pointerEvents: 'none',
    width: rect.width + 'px', top: rect.top + 'px', left: rect.left + 'px',
    opacity: '0.88', borderRadius: getComputedStyle(item).borderRadius,
    boxShadow: '0 8px 24px rgba(0,0,0,.18)',
    background: 'var(--card-bg, var(--sidebar-bg, #fff))',
  });
  document.body.appendChild(ghost);

  const ph = document.createElement('div');
  ph.className = phClass;
  item.after(ph);
  item.style.opacity = '0.1';

  _drag = { item, container, ghost, ph, itemSelector, onDrop,
    offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
  document.body.style.userSelect = 'none';
}

function _endDrag() {
  if (!_drag) return;
  const { item, container, ghost, ph, itemSelector, onDrop } = _drag;
  _drag = null;
  container.insertBefore(item, ph);
  ph.remove();
  item.style.opacity = '';
  ghost.remove();
  document.body.style.userSelect = '';
  const orderedIds = [...container.querySelectorAll(':scope > ' + itemSelector)]
    .filter(el => el.dataset.id)
    .map(el => +el.dataset.id);
  onDrop(orderedIds);
}

function _cancelDrag() {
  if (!_drag) return;
  const { item, ghost, ph } = _drag;
  _drag = null;
  item.style.opacity = '';
  ghost.remove();
  ph.remove();
  document.body.style.userSelect = '';
}

function startListDrag(e, listId) {
  const item = e.currentTarget.closest('.list-item');
  const container = item.parentElement;
  _startDrag(e, item, container, '.list-item[data-id]', 'drag-placeholder-list', async ids => {
    await api('POST', '/api/lists/reorder', { ids });
    lists = await api('GET', '/api/lists');

function startTaskDrag(e, taskId) {

  const container = item.parentElement;

    await api('POST', `/api/lists/${activeListId}/tasks/reorder`, { ids });
    tasks = await api('GET', `/api/lists/${activeListId}/tasks?include_done=${showDone}&sort=${sortMode}`);
    renderTasks();
  });

// ── Utils ─────────────────────────────────────────────────────────────────────
const _REC_ALIASES = {daily:'1d', weekly:'1w', monthly:'1m', yearly:'1y'};
function parseRecurrence(r) {
  if (!r) return null;
  const s = _REC_ALIASES[r] || r;
  return { n: parseInt(s), unit: s.slice(-1) };
}
function fmtRecurrence(r) {
  const p = parseRecurrence(r);
  if (!p) return '';
  const singular = {d:'Daily', w:'Weekly', m:'Monthly', y:'Yearly'};
  if (p.n === 1) return singular[p.unit] || r;
  const plural = {d:'days', w:'weeks', m:'months', y:'years'};
  return `Every ${p.n} ${plural[p.unit] || p.unit}`;
}

function calcOverdueCycles(t) {
  if (!t.recurrence || !t.due_date || t.done) return 0;
  const due = new Date(t.due_date.substring(0, 10) + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  if (due >= today) return 0;
  const p = parseRecurrence(t.recurrence);
  if (!p) return 0;
  const days = Math.floor((today - due) / 86400000);
  if (p.unit === 'd') return Math.floor(days / p.n);
  if (p.unit === 'w') return Math.floor(days / (p.n * 7));
  if (p.unit === 'm') {
    const m = (today.getFullYear()-due.getFullYear())*12 + (today.getMonth()-due.getMonth());
    return Math.max(0, Math.floor((today.getDate() < due.getDate() ? m-1 : m) / p.n));
  }
  if (p.unit === 'y') {
    const y = today.getFullYear() - due.getFullYear();
    const behind = today.getMonth()<due.getMonth()||(today.getMonth()===due.getMonth()&&today.getDate()<due.getDate());
    return Math.max(0, Math.floor((behind ? y-1 : y) / p.n));
  }
  return 0;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtDate(d) {
  if (!d) return '';
  const hasTime = d.length > 10;
  const dayDt = new Date(d.substring(0, 10) + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((dayDt - today) / 86400000);
  const dayLabel = diff === 0 ? 'Today' : diff === 1 ? 'Tomorrow' : diff === -1 ? 'Yesterday'
    : dayDt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  if (!hasTime) return dayLabel;
  const timePart = new Date(d).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  return `${dayLabel}, ${timePart}`;
}

async function doLogout() {
  await fetch('/logout', { method: 'POST' });
  window.location.href = '/login';
}

async function inviteSomeone() {

  if (!data) return;
  window.prompt('Share this invite link (expires in 7 days):', data.url);
}

// ── Share modal ──────────────────────────────────────────────────────────────
let shareListId = null;

async function openShareModal() {
  shareListId = activeListId;
  const list = lists.find(l => l.id === shareListId);
  document.getElementById('share-modal-title').textContent = `Share "${list.name}"`;
  document.getElementById('share-add-input').value = '';
  document.getElementById('share-error').textContent = '';
  document.getElementById('share-modal-overlay').classList.add('open');
  await refreshShareMembers();
}

function closeShareModal() {
  document.getElementById('share-modal-overlay').classList.remove('open');
  shareListId = null;
}

function closeShareModalBg(e) {
  if (e.target === document.getElementById('share-modal-overlay')) closeShareModal();
}

async function refreshShareMembers() {
  const members = await api('GET', `/api/lists/${shareListId}/members`);
  if (!members) return;
  const list = lists.find(l => l.id === shareListId);
  const ownerId = list.user_id;
  const el = document.getElementById('share-members-list');
  if (!members.length) { el.innerHTML = '<p style="font-size:13px;color:var(--muted)">No members yet.</p>'; return; }
  el.innerHTML = members.map(m => `
    <div class="share-member-row">
      <span>
        <span class="share-member-name">${esc(m.username)}</span>
        ${m.id === ownerId ? '<span class="share-member-owner">(owner)</span>' : ''}
      </span>
      ${m.id !== ownerId
        ? `<button class="share-remove-btn" onclick="removeMember(${m.id})">Remove</button>`
        : ''}
    </div>`).join('');
}

async function addShareMember() {
  const input = document.getElementById('share-add-input');
  const username = input.value.trim();
  if (!username) return;
  const errEl = document.getElementById('share-error');
  errEl.textContent = '';
  const res = await fetch(`/api/lists/${shareListId}/members`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username}),
  });
  if (res.status === 401) { window.location.href = '/login'; return; }
  if (res.status === 404) { errEl.textContent = 'User not found.'; return; }
  if (!res.ok) { errEl.textContent = 'Something went wrong.'; return; }
  input.value = '';
  await refreshShareMembers();
}

async function removeMember(userId) {
  await api('DELETE', `/api/lists/${shareListId}/members/${userId}`);
  await refreshShareMembers();
}
